agents:
  echoer:
    cmd: sh
    autostart: true
    watch: "trigger.txt"
  prompter:
    cmd: sh
    autostart: true
    kind: agent   # sh would infer terminal; forced agent so attention stays on (live test)
  flaky:
    cmd: sh
    autostart: true
    restart: on-crash
    attention: false
layouts:
  solo:
    grid: 2up
    agents: [echoer]
