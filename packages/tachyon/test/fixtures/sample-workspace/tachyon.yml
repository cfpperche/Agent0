agents:
  echoer:
    cmd: sh
    autostart: true
    watch: "trigger.txt"
  prompter:
    cmd: sh
    autostart: true
    kind: agent   # sh would infer terminal; forced agent so attention stays on (live test)
  flaky:
    cmd: sh
    autostart: true
    restart: on-crash
    attention: false
layouts:
  solo:
    grid: 2up
    agents: [echoer]
commands:
  hello:
    cmd: "echo integration-hello"
  failer:
    cmd: "sh -c 'echo doomed; exit 7'"
runbooks:
  ship:
    steps: [hello, "echo inline-step"]
  doomed:
    steps: [hello, failer, "echo never-reached"]
